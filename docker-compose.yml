version: "3.9"

# Local-only stack. No production secrets here.
# `docker-compose up -d` brings up Postgres+pgvector and the API.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: quill-db
    environment:
      POSTGRES_USER: quill
      POSTGRES_PASSWORD: quill
      POSTGRES_DB: quill
    ports:
      - "5432:5432"
    volumes:
      - quill_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quill -d quill"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: quill-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://quill:quill@db:5432/quill
      DATABASE_URL_SYNC: postgresql+psycopg2://quill:quill@db:5432/quill
      SECRET_KEY: dev-secret-change-me
      AGENT_SHARED_SECRET: dev-agent-secret-change-me
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic -c api/alembic.ini upgrade head &&
             uvicorn app.main:app --app-dir api --host 0.0.0.0 --port 8000"

  bot:
    # Sprint 2.4 — Telegram bot service.
    # Bring up with `docker-compose --profile bot up bot`.
    profiles: ["bot"]
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    container_name: quill-bot
    depends_on:
      api:
        condition: service_started
    environment:
      QUILL_API_URL: http://api:8000
      QUILL_WS_URL: ws://api:8000/ws/approvals
      QUILL_WEB_BASE_URL: ${QUILL_WEB_BASE_URL:-http://localhost:3000}
      AGENT_SHARED_SECRET: dev-agent-secret-change-me
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PAIRING_SECRET: ${TELEGRAM_PAIRING_SECRET:-dev-pairing-secret-change-me}
      DEEPLINK_SIGNING_SECRET: ${DEEPLINK_SIGNING_SECRET:-dev-deeplink-secret-change-me}
      DAILY_BRIEF_CHAT_ID: ${DAILY_BRIEF_CHAT_ID:-}
      SENTRY_DSN_BOT: ${SENTRY_DSN_BOT:-}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["quill-bot", "run"]

volumes:
  quill_pgdata:
