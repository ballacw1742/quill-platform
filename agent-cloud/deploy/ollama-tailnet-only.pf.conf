# pf anchor: restrict ollama (:11434) to loopback + the Tailscale tailnet only.
#
# Rationale (§8 model-lane router): ollama binds 0.0.0.0:11434 so the Cloud Run
# orchestrator can reach it over Tailscale, but 0.0.0.0 also exposes it on the
# LAN (en1 192.168.1.x). These rules drop any inbound to 11434 that is NOT from
# loopback or the Tailscale CGNAT range (100.64.0.0/10), closing the LAN
# exposure without depending on the (dynamic) utunN interface name.
#
# Interface-independent by design: Tailscale peers always source from
# 100.64.0.0/10 (CGNAT), so keying on source address is stable across reboots
# and utun renumbering.
#
# Load order matters: the block is first, the passes override for allowed srcs
# (last-match wins in pf unless 'quick'; we use 'quick' so first match wins).

# Allow loopback (local tools: curl localhost:11434, local dev).
pass in quick proto tcp from 127.0.0.1 to any port 11434
pass in quick proto tcp from ::1 to any port 11434

# Allow the Tailscale tailnet (CGNAT range) — the Cloud Run node lives here.
pass in quick proto tcp from 100.64.0.0/10 to any port 11434

# Drop everything else to 11434 (LAN, any other interface).
block drop in quick proto tcp from any to any port 11434
