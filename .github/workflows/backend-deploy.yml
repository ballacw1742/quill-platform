name: Deploy Quill Backend to Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'api/**'
      - 'agents/**'
      - 'Dockerfile'
      - 'pyproject.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push image
        run: |
          docker build -t gcr.io/totemic-formula-467102-s9/quill-api:${{ github.sha }} .
          docker push gcr.io/totemic-formula-467102-s9/quill-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy quill-agents \
            --image gcr.io/totemic-formula-467102-s9/quill-api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --no-allow-unauthenticated \
            --update-env-vars DATASITE_URL=https://datasite-agents-894031978246.us-central1.run.app \
            --update-secrets AGENTCLOUD_SERVICE_SECRET=QUILL_AGENT_SECRET:latest \
            --project totemic-formula-467102-s9

      - name: Run database migrations
        run: |
          # Update the migration job to use the freshly deployed image, then execute it.
          # The job connects to Cloud SQL via the Unix socket (same as the service).
          gcloud run jobs update quill-migrate \
            --image gcr.io/totemic-formula-467102-s9/quill-api:${{ github.sha }} \
            --region us-central1 \
            --project totemic-formula-467102-s9
          gcloud run jobs execute quill-migrate \
            --region us-central1 \
            --project totemic-formula-467102-s9 \
            --wait

      - name: Grant public access (re-apply after each deploy)
        run: |
          gcloud run services add-iam-policy-binding quill-agents \
            --region us-central1 \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project totemic-formula-467102-s9
